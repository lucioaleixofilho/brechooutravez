name: Publicar Artigo no Google Meu Negócio

on:
  schedule:
    # Todo domingo às 10h UTC (~7h BRT) — o script decide se há artigo para hoje
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      force_article:
        description: 'Forçar número do artigo (ex: 12). Deixe em branco para automático.'
        required: false
        default: ''

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Postar no Google Meu Negócio
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SITE_URL:             'https://brechooutravez.com.br'
          FORCE_ARTICLE:        ${{ github.event.inputs.force_article }}
        run: node scripts/gmb-post.js
